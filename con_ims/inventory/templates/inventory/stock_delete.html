{% extends "utils/base.html" %}

{% block content %}
<h2>Delete Stock Entry</h2>

<p>Are you sure you want to delete stock for:</p>

<ul>
    <li><strong>Item Variant:</strong> {{ stock.item_variant }}</li>
    <li><strong>Location:</strong> {{ stock.location }}</li>
</ul>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Delete</button>
    <a href="{% url 'stock_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
