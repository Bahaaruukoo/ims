{% extends "utils/base.html" %}

{% block content %}
<h2 class="mb-3">Items</h2>

<a href="{% url 'item_create' %}" class="btn btn-primary mb-3">Add Item</a>

<ul class="list-group">
    {% for item in items %}
        <li class="list-group-item d-flex justify-content-between row">
              <!-- Number column -->
            <div class="col-md-1">
                <span class="badge bg-secondary">{{ forloop.counter }}</span>
            </div>

            <div class="col-md-4 text-start">
                <strong>{{ item.name }}</strong>
                <span class="text-muted">({{ item.category }})</span>
            </div>

            <div class="col-md-3 text-end">
                <a href="{% url 'item_update' item.id %}" class="btn btn-sm btn-outline-primary">Edit</a>
                <a href="{% url 'item_delete' item.id %}" class="btn btn-sm btn-outline-danger">Delete</a>
            </div>
        </li>
    {% endfor %}
</ul>
{% endblock %}
