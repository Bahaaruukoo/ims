{% extends "utils/base.html" %}

{% block content %}
<h2>Delete Item</h2>

<p>Are you sure you want to delete <strong>{{ item.name }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Delete</button>
    <a href="{% url 'item_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
