{% extends "utils/base.html" %}

{% block content %}
<h2>{{ title }}</h2>

<form method="post" id="variantForm" class="row g-3">
    {% csrf_token %}

    <script>
        if (window.opener) {
            window.opener.postMessage({
                type: "refresh",
                section: "materials"
            }, "*");
        }
        window.close();
    </script>

    <!-- ITEM + ADD BUTTON -->
    <div class="col-12 d-flex align-items-center gap-2">
        <div class="flex-grow-1">
            <label class="form-label">Item</label>
            {{ form.item }}
        </div>

        <!-- DIRECT POPUP CALL -->
        <button type="button"
                class="btn btn-primary mt-4"
                onclick="window.open('{% url 'item_create' %}?modal=true', 'popupWindow2', 'width=600,height=600,left=200,top=200')">
            +
        </button>
    </div>

    <!-- OTHER FIELDS -->
    <div class="col-12">
        <label class="form-label">Name</label>
        {{ form.name }}
    </div>

    <div class="col-12">
        <label class="form-label">Unit Cost</label>
        {{ form.unit_cost }}
    </div>

    <div class="col-12">
        <label class="form-label">SKU</label>
        {{ form.sku }}
    </div>

    <!-- Hidden JSON field -->
    <input type="hidden" name="attributes" id="attributes_json">

    <!-- ATTRIBUTES -->
    <h4 class="mt-4">Attributes</h4>

    <div id="attributes_container" class="col-12"></div>

    <button type="button" class="btn btn-secondary mt-2" onclick="addAttributeRow()">Add Attribute</button>

    <button type="submit" class="btn btn-success mt-4">Save</button>
</form>

{% if popup %}
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const navbar = document.getElementById("navbar");
        if (navbar) {
            navbar.style.display = "none";
        }
    });
</script>
{% endif %}


<script>
function refreshItemDropdown(id, name) {
    const select = document.getElementById("id_item");
    const option = document.createElement("option");
    option.value = id;
    option.textContent = name;
    option.selected = true;
    select.appendChild(option);
}

// ------------------ ATTRIBUTE BUILDER ------------------

document.addEventListener("DOMContentLoaded", function () {
    const existing = {{ form.instance.attributes|default:"{}"|safe }};
    for (const [key, value] of Object.entries(existing)) {
        addAttributeRow(key, value);
    }
});

function addAttributeRow(key = "", value = "") {
    const container = document.getElementById("attributes_container");

    const row = document.createElement("div");
    row.classList.add("row", "g-2", "mb-2");

    row.innerHTML = `
        <div class="col-sm-4">
            <input type="text" class="form-control attr-key" placeholder="Key" value="${key}">
        </div>
        <div class="col-sm-4">
            <input type="text" class="form-control attr-value" placeholder="Value" value="${value}">
        </div>
        <div class="col-sm-2">
            <button type="button" class="btn btn-danger w-100" onclick="this.parentElement.parentElement.remove()">Remove</button>
        </div>
    `;

    container.appendChild(row);
}

// ------------------ JSON PACKING ------------------

document.getElementById("variantForm").addEventListener("submit", function () {
    const keys = document.querySelectorAll(".attr-key");
    const values = document.querySelectorAll(".attr-value");

    let data = {};

    keys.forEach((keyInput, i) => {
        const k = keyInput.value.trim();
        const v = values[i].value.trim();
        if (k) data[k] = v;
    });

    document.getElementById("attributes_json").value = JSON.stringify(data);
});
</script>

{% endblock %}
