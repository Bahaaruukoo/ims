{% extends "utils/base.html" %}

{% block content %}
    <h2>{{ location.name }}</h2>

    <p><strong>Project:</strong> {{ location.project|default:"None" }}</p>

    <a href="{% url 'location_update' location.id %}" class="btn btn-primary">Edit</a>
    <a href="{% url 'location_delete' location.id %}" class="btn btn-danger">Delete</a>

    <hr>

    <h4>Stocks at this Location</h4>
    <p class="text-muted">You can later add stock listing here.</p>

{% endblock %}
