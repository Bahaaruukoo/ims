{% extends "utils/base.html" %}

{% block content %}
<div class="d-flex justify-content-between" >    
    <h2 class="mb-3">Warehouses</h2>
    <a href="{% url 'location_create' %}" class="btn btn-primary mb-3">Add Warehouse</a>
</div>
<form method="get" class="row g-2 mb-3">
    <div class="col-md-4">
        <input 
            type="text" 
            name="name" 
            value="{{ name_query }}" 
            placeholder="Search warehouse name" 
            class="form-control"
        >
    </div>

    <div class="col-md-2">
        <button type="submit" class="btn btn-primary w-100">Filter</button>
    </div>

</form>
<ul class="list-group">
    {% for loc in locations %}
        <li class="list-group-item d-flex justify-content-between align-items-center row">
              <!-- Number column -->
            <div class="col-md-1">
                <span class="badge bg-secondary">{{ forloop.counter }}</span>
            </div>

            <div class="col-md-4 text-start">
                {% if loc.project %}
                    <span class="">{{ loc.project.name }}</span>
                {% endif %}
            </div>

            <div class="col-md-4 text-start">
                <span>{{ loc.name }}</span>
            </div>

            <div class="col-md-3 text-end">
                <a href="{% url 'location_update' loc.id %}" class="btn btn-sm btn-outline-primary">Edit</a>
                <a href="{% url 'location_delete' loc.id %}" class="btn btn-sm btn-outline-danger">Delete</a>
            </div>
        </li>
    {% endfor %}
</ul>
{% endblock %}
