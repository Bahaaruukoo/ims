{% extends "utils/base.html" %}

{% block content %}
<h2>Approve Request</h2>

<form method="post" class="row g-3">
    {% csrf_token %}

    {% for item in request_obj.items.all %}
        <div class="col-md-6">
            <div class="card p-3">
                <strong>{{ item.item_variant }}</strong><br>
                Requested: {{ item.requested_quantity }}

                <label class="form-label mt-2">Approve Quantity</label>
                <input name="approved_{{ item.id }}" 
                       value="{{ item.requested_quantity }}" 
                       type="number" 
                       min="0" 
                       max="{{ item.requested_quantity }}"
                       class="form-control">
            </div>
        </div>
    {% endfor %}

    <div class="col-12">
        <button type="submit" class="btn btn-success mt-3">Approve</button>
    </div>
</form>
{% endblock %}
