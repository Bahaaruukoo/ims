<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Coming Soon</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(135deg, #2c3e50, #4b79a1);
        color: #fff;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .card {
        background: rgba(255,255,255,0.08);
        border: none;
        backdrop-filter: blur(8px);
        border-radius: 12px;
    }

    .title {
        font-size: 2rem;
        font-weight: 600;
    }

    .subtitle {
        color: #ddd;
    }
</style>

</head>
<body>

<div class="container">
    <div class="card p-5 shadow-lg">

    <div class="title mb-3">Coming Soon</div>

    <p class="subtitle mb-4">
        This page is under construction. We're working on something great and will be live shortly.
    </p>

    <!-- Optional email capture -->
    <form class="row g-2 justify-content-center">
        <div class="col-md-6">
            <input type="email" class="form-control" placeholder="Enter your email">
        </div>
        <div class="col-auto">
            <button class="btn btn-light">Notify Me</button>
        </div>
    </form>

    <p class="mt-4 small text-light opacity-75">
        Please check back later.
    </p>

</div>

</div>

</body>
</html>
